name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['**']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: cd podcast-video-editor && uv sync

      - name: Lint
        run: cd podcast-video-editor && uv run ruff check . || true

      - name: Test
        run: cd podcast-video-editor && uv run pytest --tb=short || true
