name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['**']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: cd podcast-video-editor && uv sync

      - name: Lint
        run: cd podcast-video-editor && uv run ruff check . || true

      - name: Test
        run: cd podcast-video-editor && uv run pytest --tb=short || true
